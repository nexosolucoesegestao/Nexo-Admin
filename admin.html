<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO Intelligence Admin</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- ── Sidebar Backdrop (mobile) ── -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="app-shell">

        <!-- ══════════════════════════════════════════════════ -->
        <!-- SIDEBAR                                           -->
        <!-- ══════════════════════════════════════════════════ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo-icon.png" alt="N" onerror="this.outerHTML='<span style=\'font-size:1.5rem;font-weight:700;color:var(--gold-400)\'>N</span>'">
                <div class="brand-text">
                    <span class="brand-name">NEXO</span>
                    <span class="brand-sub">Intelligence Admin</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <!-- Visão Geral -->
                <div class="sidebar-section">
                    <div class="sidebar-section-label">Visão Geral</div>
                    <a class="sidebar-link" data-route="dashboard" href="#/dashboard">
                        <span class="icon">📊</span> Dashboard
                    </a>
                </div>

                <!-- Cadastros -->
                <div class="sidebar-section">
                    <div class="sidebar-section-label">Cadastros</div>
                    <a class="sidebar-link only-super" data-route="redes" href="#/redes">
                        <span class="icon">🏢</span> Redes
                    </a>
                    <a class="sidebar-link" data-route="lojas" href="#/lojas">
                        <span class="icon">🏪</span> Lojas
                    </a>
                    <a class="sidebar-link" data-route="pessoas" href="#/pessoas">
                        <span class="icon">👥</span> Pessoas
                    </a>
                    <a class="sidebar-link" data-route="produtos" href="#/produtos">
                        <span class="icon">🥩</span> Produtos
                    </a>
                    <a class="sidebar-link" data-route="vinculos" href="#/vinculos">
                        <span class="icon">🔗</span> Loja ↔ Produtos
                    </a>
                </div>

                <!-- Configurações -->
                <div class="sidebar-section">
                    <div class="sidebar-section-label">Configuração</div>
                    <a class="sidebar-link" data-route="perguntas" href="#/perguntas">
                        <span class="icon">❓</span> Perguntas
                    </a>
                    <a class="sidebar-link" data-route="motivos" href="#/motivos">
                        <span class="icon">📋</span> Motivos
                    </a>
                    <a class="sidebar-link" data-route="conformidade" href="#/conformidade">
                        <span class="icon">🌡️</span> Conformidade
                    </a>
                </div>

                <!-- Admin -->
                <div class="sidebar-section only-super">
                    <div class="sidebar-section-label">Administração</div>
                    <a class="sidebar-link only-super" data-route="usuarios" href="#/usuarios">
                        <span class="icon">🔐</span> Usuários Admin
                    </a>
                </div>
            </nav>

            <!-- User footer -->
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar" id="user-avatar">N</div>
                    <div class="user-info">
                        <div class="user-name" id="user-name">Carregando...</div>
                        <div class="user-role" id="user-role">—</div>
                    </div>
                    <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
                </div>
            </div>
        </aside>

        <!-- ══════════════════════════════════════════════════ -->
        <!-- MAIN CONTENT                                      -->
        <!-- ══════════════════════════════════════════════════ -->
        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <h2 id="page-title">Dashboard</h2>
                <div id="header-actions"></div>
            </header>

            <div class="page-container" id="page-container">
                <!-- Conteúdo carregado pelo router -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <span>Carregando...</span>
                </div>
            </div>
        </main>

    </div>

    <!-- ── Scripts ── -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/router.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-app.js"></script>
</body>
</html>
