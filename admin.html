<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https://kkjfqltpykkuwshtfhow.supabase.co;
        connect-src 'self' https://kkjfqltpykkuwshtfhow.supabase.co;
        worker-src 'self';
    ">

    <title>NEXO Intelligence Admin</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout" id="admin-layout" style="display:none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo-nexo.png" alt="NEXO" class="sidebar-logo" onerror="this.style.display='none'">
                <span class="sidebar-title">Intelligence Admin</span>
                <button class="sidebar-close" id="sidebar-close">✕</button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar" id="user-avatar">N</div>
                    <div class="user-info">
                        <div class="user-name" id="user-name">Carregando...</div>
                        <div class="user-role" id="user-role">—</div>
                    </div>
                    <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <h2 id="page-title">Dashboard</h2>
                <div id="header-actions"></div>
            </header>
            <div class="page-container" id="page-container">
                <div class="loading-state"><div class="spinner"></div><span>Carregando...</span></div>
            </div>
        </main>
    </div>

    <!-- Loading inicial (esconde layout até auth verificar) -->
    <div id="auth-loading" style="
        position:fixed;inset:0;background:var(--bg-primary,#0C1425);
        display:flex;align-items:center;justify-content:center;z-index:9999;
    ">
        <div style="text-align:center;color:#C9A84C;">
            <div class="spinner"></div>
            <p style="margin-top:1rem;font-size:0.9rem;">Verificando acesso...</p>
        </div>
    </div>

    <!-- 1. Supabase SDK — versão fixada + SRI -->
    <script
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"
        integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil"
        crossorigin="anonymous">
    </script>

    <!-- 2. Chart.js — versão fixada + SRI -->
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"
        integrity="sha384-eI7i/zFuTrqeEWfmFuTVSuJKKX7tpdjmbRLMfRg5APKV5sHkVtXn3aOb/GGBGPF"
        crossorigin="anonymous">
    </script>

    <!-- 3. XLSX — versão fixada + SRI -->
    <script
        src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
        integrity="sha384-QF9h2wHpz9QIJ2YJ3LVNLQ6BLhVqWA6WRuNaRNdnN7jWUWpSjcKQ5l8Z4jYPUPy"
        crossorigin="anonymous">
    </script>

    <!-- 4. Env vars — gerado no build Vercel -->
    <script src="env.js"></script>

    <!-- 5. App scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/router.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-app.js"></script>
</body>
</html>
