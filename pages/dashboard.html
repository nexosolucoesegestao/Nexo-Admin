<!-- Dashboard v2d — ES5 compativel com new Function() -->

<div class="page-header">
    <div>
        <h1>Dashboard</h1>
        <p class="subtitle">Visão geral da operação NEXO</p>
    </div>
</div>

<div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Redes ativas</div><div class="stat-value gold" id="stat-redes">—</div></div>
    <div class="stat-card"><div class="stat-label">Lojas implantadas</div><div class="stat-value" id="stat-lojas">—</div></div>
    <div class="stat-card"><div class="stat-label">Pessoas cadastradas</div><div class="stat-value" id="stat-pessoas">—</div></div>
    <div class="stat-card"><div class="stat-label">MRR</div><div class="stat-value gold" id="stat-mrr">—</div></div>
</div>

<div style="display:grid; grid-template-columns:1.3fr 1fr; gap:1rem; margin-bottom:1.5rem;">
    <div class="card">
        <div class="card-header"><h3>Lojas por rede</h3></div>
        <div style="position:relative; height:220px; padding:0.5rem;">
            <canvas id="chart-lojas-rede"></canvas>
        </div>
    </div>
    <div class="card">
        <div class="card-header"><h3>Produtos por proteína</h3></div>
        <div style="display:flex; align-items:center; justify-content:center; gap:24px; padding:1rem;">
            <div style="position:relative; width:180px; height:180px;">
                <canvas id="chart-proteina"></canvas>
            </div>
            <div id="donut-legend" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
    </div>
</div>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
    <div class="card">
        <div class="card-header"><h3>Contratos</h3><span style="font-size:0.8rem;"><a href="#/contratos" style="color:var(--gold-400)">Ver todos →</a></span></div>
        <div id="dash-contratos" style="padding:0 0.25rem;"></div>
    </div>
    <div class="card">
        <div class="card-header"><h3>Acesso rápido</h3></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; padding:0.25rem;">
            <a href="#/lojas" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">🏪 Lojas</a>
            <a href="#/pessoas" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">👥 Pessoas</a>
            <a href="#/vinculos" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">🔗 Vínculos</a>
            <a href="#/perguntas" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">❓ Perguntas</a>
            <a href="#/contratos" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">📄 Contratos</a>
            <a href="#/produtos" class="btn btn-secondary btn-sm" style="justify-content:flex-start;">🥩 Produtos</a>
        </div>
    </div>
</div>

<script>
window.initDashboard = function() {
    Promise.all([
        NEXO.api.getStats(),
        NEXO.api.getLojas(),
        NEXO.api.getProdutos(),
        NEXO.api.getContratos().catch(function() { return []; })
    ]).then(function(results) {
        var stats = results[0];
        var lojas = results[1];
        var produtos = results[2];
        var contratos = results[3];

        document.getElementById('stat-redes').textContent = stats.redes;
        document.getElementById('stat-lojas').textContent = stats.lojas;
        document.getElementById('stat-pessoas').textContent = stats.pessoas;
        document.getElementById('stat-mrr').textContent = 'R$ ' + stats.mrr.toLocaleString('pt-BR', {minimumFractionDigits:0});

        // Lojas por rede
        var redeCount = {};
        lojas.forEach(function(l) {
            var r = (l.redes && l.redes.nome) || l.rede || 'Sem rede';
            redeCount[r] = (redeCount[r] || 0) + 1;
        });
        new Chart(document.getElementById('chart-lojas-rede'), {
            type: 'bar',
            data: {
                labels: Object.keys(redeCount),
                datasets: [{ label: 'Lojas', data: Object.values(redeCount), backgroundColor: '#c9a84c', borderRadius: 6, barThickness: 32 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { display: false } },
                    y: { ticks: { color: '#64748b', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
                }
            }
        });

        // Produtos por proteína
        var protCount = {};
        produtos.forEach(function(p) { protCount[p.proteina] = (protCount[p.proteina] || 0) + 1; });
        var protColors = { 'Bovino': '#c9a84c', 'Suino': '#34d399', 'Aves': '#60a5fa' };
        var labels = Object.keys(protCount);
        var values = Object.values(protCount);
        var colors = labels.map(function(k) { return protColors[k] || '#94a3b8'; });
        new Chart(document.getElementById('chart-proteina'), {
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, aspectRatio: 1, cutout: '60%', plugins: { legend: { display: false } } }
        });

        // Legenda donut
        var legendEl = document.getElementById('donut-legend');
        if (legendEl) {
            legendEl.innerHTML = labels.map(function(l, i) {
                return '<div style="display:flex;align-items:center;gap:8px;">' +
                    '<div style="width:12px;height:12px;border-radius:2px;background:' + colors[i] + ';flex-shrink:0;"></div>' +
                    '<span style="font-size:0.8rem;color:#94a3b8;">' + l + ' (' + values[i] + ')</span>' +
                    '</div>';
            }).join('');
        }

        // Contratos recentes
        var contEl = document.getElementById('dash-contratos');
        if (contEl && contratos.length > 0) {
            var statusMap = { 'ativo': '#34d399', 'pausado': '#f59e0b', 'cancelado': '#ef4444', 'prospecto': '#60a5fa' };
            contEl.innerHTML = contratos.slice(0, 4).map(function(c) {
                var cor = statusMap[c.status] || '#94a3b8';
                return '<div style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.05);">' +
                    '<div><div style="font-size:0.85rem;font-weight:500;color:#e2e8f0;">' + (c.cliente || c.id_rede || '—') + '</div>' +
                    '<div style="font-size:0.75rem;color:#64748b;">' + (c.tipo || '—') + '</div></div>' +
                    '<div style="display:flex;align-items:center;gap:8px;">' +
                    '<span style="font-size:0.8rem;color:#c9a84c;">R$ ' + ((c.valor_mensal || 0).toLocaleString('pt-BR')) + '</span>' +
                    '<span style="font-size:0.7rem;padding:2px 6px;border-radius:4px;background:' + cor + '22;color:' + cor + ';">' + (c.status || '—') + '</span>' +
                    '</div></div>';
            }).join('');
        } else if (contEl) {
            contEl.innerHTML = '<p style="color:#64748b;font-size:0.85rem;padding:0.5rem 0;">Nenhum contrato cadastrado.</p>';
        }

    }).catch(function(err) {
        console.error('[Dashboard] Erro:', err);
    });
};
</script>
