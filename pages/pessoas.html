<!-- Pessoas v2 — tipo SETOR/TERCEIRO corrigido + export -->

<div class="page-header">
    <div><h1>Pessoas</h1><p class="subtitle">Colaboradores e terceiros das lojas</p></div>
    <div class="flex-gap">
        <button class="btn btn-secondary btn-sm" id="btn-export-pessoas">📥 Exportar</button>
        <button class="btn btn-primary" id="btn-nova-pessoa">+ Nova Pessoa</button>
    </div>
</div>

<div class="flex-gap mb-2">
    <select class="form-select" id="filtro-loja-pessoa" style="width:240px;"><option value="">Todas as lojas</option></select>
    <div class="search-bar" style="flex:1;max-width:280px;"><span class="search-icon">🔍</span><input type="text" class="form-input" id="search-pessoas" placeholder="Buscar pessoa..." style="padding-left:2.5rem;"></div>
</div>

<div class="card">
    <div class="card-header"><h3 id="pessoas-count">Carregando...</h3></div>
    <div id="pessoas-table-area"><div class="loading-state"><div class="spinner"></div><span>Carregando...</span></div></div>
</div>

<div class="modal-overlay" id="modal-pessoa" style="display:none;">
    <div class="modal" style="max-width:520px;">
        <div class="modal-header"><h3 id="modal-pessoa-title">Nova Pessoa</h3></div>
        <div class="modal-body">
            <input type="hidden" id="pessoa-id">
            <div class="form-group mb-2"><label class="form-label">Nome Completo *</label><input type="text" class="form-input" id="pessoa-nome"></div>
            <div class="form-group mb-2"><label class="form-label">Loja *</label><select class="form-select" id="pessoa-loja"><option value="">Selecione...</option></select></div>
            <div class="form-row mb-2">
                <div class="form-group"><label class="form-label">Cargo *</label>
                    <select class="form-select" id="pessoa-cargo"><option value="">Selecione...</option><option>Encarregado</option><option>Açougueiro</option><option>Auxiliar</option><option>Balconista</option><option>Gerente</option><option>Promotor</option><option>Outro</option></select>
                </div>
                <div class="form-group"><label class="form-label">Turno</label>
                    <select class="form-select" id="pessoa-turno"><option value="">—</option><option>Manhã</option><option>Tarde</option><option>Integral</option><option>Noturno</option></select>
                </div>
            </div>
            <div class="form-row mb-2">
                <div class="form-group"><label class="form-label">Tipo *</label>
                    <select class="form-select" id="pessoa-tipo">
                        <option value="SETOR">Funcionário do Setor</option>
                        <option value="TERCEIRO">Terceiro/Promotor</option>
                    </select>
                </div>
                <div class="form-group" id="grupo-marca" style="display:none;">
                    <label class="form-label">Marca</label>
                    <input type="text" class="form-input" id="pessoa-marca" placeholder="Ex: Seara">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Telefone</label><input type="text" class="form-input" id="pessoa-telefone"></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="pessoa-email"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" id="modal-pessoa-cancel">Cancelar</button>
            <button class="btn btn-primary" id="modal-pessoa-save">Salvar</button>
        </div>
    </div>
</div>

<script>
window.initPessoas = async () => {
    let pessoas = [], lojas = [];
    async function load() {
        try {
            [pessoas, lojas] = await Promise.all([NEXO.api.getPessoas(), NEXO.api.getLojas()]);
            const opts = lojas.map(l => `<option value="${l.id}">${NEXO.ui.escapeHtml(l.nome)}</option>`).join('');
            document.getElementById('filtro-loja-pessoa').innerHTML = `<option value="">Todas as lojas</option>${opts}`;
            document.getElementById('pessoa-loja').innerHTML = `<option value="">Selecione...</option>${opts}`;
            render(pessoas);
        } catch (err) { NEXO.ui.toast('Erro ao carregar.', 'error'); console.error(err); }
    }
    function render(data) {
        document.getElementById('pessoas-count').textContent = `${data.length} pessoa${data.length !== 1 ? 's' : ''}`;
        if (!data.length) { document.getElementById('pessoas-table-area').innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>Nenhuma pessoa cadastrada</p></div>'; return; }
        const rows = data.map(p => {
            const lojaNome = p.lojas?.nome || '—';
            const tipoBadge = p.tipo === 'TERCEIRO'
                ? `<span class="badge badge-gold">${NEXO.ui.escapeHtml(p.marca_terceiro || 'Terceiro')}</span>`
                : '<span class="badge badge-info">Setor</span>';
            return `<tr>
                <td><strong>${NEXO.ui.escapeHtml(p.nome)}</strong></td>
                <td>${NEXO.ui.escapeHtml(lojaNome)}</td>
                <td>${NEXO.ui.escapeHtml(p.cargo || '—')}</td>
                <td>${NEXO.ui.escapeHtml(p.turno || '—')}</td>
                <td>${tipoBadge}</td>
                <td><div class="flex-gap"><button class="btn btn-ghost btn-sm" onclick="editPessoa('${p.id}')">✏️</button><button class="btn btn-ghost btn-sm" onclick="removePessoa('${p.id}','${NEXO.ui.escapeHtml(p.nome)}')">🗑️</button></div></td>
            </tr>`;
        }).join('');
        document.getElementById('pessoas-table-area').innerHTML = `<div class="data-table-wrapper"><table class="data-table"><thead><tr><th>Nome</th><th>Loja</th><th>Cargo</th><th>Turno</th><th>Tipo</th><th style="width:100px">Ações</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    const modal = document.getElementById('modal-pessoa');
    const tipoSelect = document.getElementById('pessoa-tipo');
    const grupoMarca = document.getElementById('grupo-marca');
    tipoSelect.onchange = () => { grupoMarca.style.display = tipoSelect.value === 'TERCEIRO' ? '' : 'none'; };
    const openModal = (p = null) => {
        document.getElementById('modal-pessoa-title').textContent = p ? 'Editar Pessoa' : 'Nova Pessoa';
        document.getElementById('pessoa-id').value = p?.id || '';
        document.getElementById('pessoa-nome').value = p?.nome || '';
        document.getElementById('pessoa-loja').value = p?.loja_id || '';
        document.getElementById('pessoa-cargo').value = p?.cargo || '';
        document.getElementById('pessoa-turno').value = p?.turno || '';
        document.getElementById('pessoa-tipo').value = p?.tipo || 'SETOR';
        document.getElementById('pessoa-marca').value = p?.marca_terceiro || '';
        document.getElementById('pessoa-telefone').value = p?.telefone || '';
        document.getElementById('pessoa-email').value = p?.email || '';
        grupoMarca.style.display = (p?.tipo === 'TERCEIRO') ? '' : 'none';
        modal.style.display = 'flex';
        requestAnimationFrame(() => modal.classList.add('modal-visible'));
    };
    const closeModal = () => { modal.classList.remove('modal-visible'); setTimeout(() => modal.style.display = 'none', 250); };
    document.getElementById('btn-nova-pessoa').onclick = () => openModal();
    document.getElementById('modal-pessoa-cancel').onclick = closeModal;
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.getElementById('modal-pessoa-save').onclick = async () => {
        const id = document.getElementById('pessoa-id').value;
        const nome = document.getElementById('pessoa-nome').value.trim();
        const lojaId = document.getElementById('pessoa-loja').value;
        const cargo = document.getElementById('pessoa-cargo').value;
        if (!nome || !lojaId || !cargo) { NEXO.ui.toast('Preencha os campos obrigatórios.', 'warning'); return; }
        const payload = {
            nome, loja_id: lojaId, cargo,
            turno: document.getElementById('pessoa-turno').value || null,
            tipo: document.getElementById('pessoa-tipo').value,
            marca_terceiro: tipoSelect.value === 'TERCEIRO' ? document.getElementById('pessoa-marca').value.trim() || null : null,
            telefone: document.getElementById('pessoa-telefone').value.trim() || null,
            email: document.getElementById('pessoa-email').value.trim() || null
        };
        const btn = document.getElementById('modal-pessoa-save');
        NEXO.ui.btnLoading(btn, true);
        try { id ? await NEXO.api.updatePessoa(id, payload) : await NEXO.api.createPessoa(payload);
            NEXO.ui.toast(id ? 'Atualizado.' : 'Cadastrado.', 'success'); closeModal(); await load();
        } catch (err) { NEXO.ui.toast('Erro: ' + err.message, 'error'); } finally { NEXO.ui.btnLoading(btn, false); }
    };
    window.editPessoa = (id) => { const p = pessoas.find(x => x.id === id); if (p) openModal(p); };
    window.removePessoa = (id, nome) => { NEXO.ui.confirm('Excluir', `Excluir "${nome}"?`, async () => {
        try { await NEXO.api.deletePessoa(id); NEXO.ui.toast('Excluído.', 'success'); await load(); } catch (err) { NEXO.ui.toast('Erro: ' + err.message, 'error'); }
    }); };
    document.getElementById('filtro-loja-pessoa').onchange = (e) => render(e.target.value ? pessoas.filter(p => p.loja_id === e.target.value) : pessoas);
    document.getElementById('search-pessoas').addEventListener('input', NEXO.ui.debounce((e) => {
        const q = e.target.value.toLowerCase(), lj = document.getElementById('filtro-loja-pessoa').value;
        let f = lj ? pessoas.filter(p => p.loja_id === lj) : pessoas;
        if (q) f = f.filter(p => p.nome.toLowerCase().includes(q) || (p.cargo||'').toLowerCase().includes(q));
        render(f);
    }, 200));
    document.getElementById('btn-export-pessoas').onclick = () => {
        const exportData = pessoas.map(p => ({ Nome: p.nome, Loja: p.lojas?.nome || '', Cargo: p.cargo, Turno: p.turno || '', Tipo: p.tipo, Marca: p.marca_terceiro || '', Telefone: p.telefone || '', Email: p.email || '' }));
        NEXO.api.exportToCSV(exportData, 'nexo_pessoas');
        NEXO.ui.toast('Arquivo exportado.', 'success');
    };
    await load();
};
</script>
