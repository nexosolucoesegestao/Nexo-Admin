<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO Intelligence — Login</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Animação sutil no card */
        .login-card {
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(12px);
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .version-tag {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <img src="assets/logo-nexo.png" alt="NEXO" onerror="this.style.display='none'">
                <h1>Intelligence Admin</h1>
            </div>

            <!-- Error message -->
            <div class="login-error" id="login-error"></div>

            <!-- Form -->
            <form id="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="seu@email.com"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        class="form-input"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btn-login" style="width:100%;">
                        Entrar
                    </button>
                </div>

                <a href="esqueci-senha.html" class="forgot-link">
                    Esqueci minha senha
                </a>
            </form>

            <div class="version-tag">NEXO Intelligence v1.0</div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>

    <script>
        (async () => {
            // Se já logado, redireciona direto
            const user = await NEXO.auth.getUser();
            if (user && ['super_admin', 'gestor_rede'].includes(NEXO.auth.getRole(user))) {
                window.location.href = 'admin.html';
                return;
            }

            // ── Login handler ──
            const form = document.getElementById('login-form');
            const btnLogin = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');

            function showError(msg) {
                errorDiv.textContent = msg;
                errorDiv.classList.add('visible');
            }

            function hideError() {
                errorDiv.classList.remove('visible');
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideError();

                const email = document.getElementById('email').value;
                const senha = document.getElementById('senha').value;

                if (!email || !senha) {
                    showError('Preencha email e senha.');
                    return;
                }

                NEXO.ui.btnLoading(btnLogin, true, 'Entrando...');

                try {
                    await NEXO.auth.login(email, senha);
                    window.location.href = 'admin.html';
                } catch (err) {
                    showError(err.message);
                    NEXO.ui.btnLoading(btnLogin, false);
                }
            });

            // Enter key
            document.getElementById('senha').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
            });
        })();
    </script>
</body>
</html>
