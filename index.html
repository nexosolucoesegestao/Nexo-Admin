<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Content Security Policy — Camada 1 de segurança -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https://kkjfqltpykkuwshtfhow.supabase.co;
        connect-src 'self' https://kkjfqltpykkuwshtfhow.supabase.co;
        worker-src 'self';
    ">

    <title>NEXO Intelligence — Login</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .login-card {
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(12px);
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .version-tag {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <img src="assets/logo-nexo.png" alt="NEXO" onerror="this.style.display='none'">
                <h1>Intelligence Admin</h1>
            </div>

            <div class="login-error" id="login-error"></div>

            <form id="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="seu@email.com"
                        autocomplete="email"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        class="form-input"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btn-login" style="width:100%;">
                        Entrar
                    </button>
                </div>
                <a href="esqueci-senha.html" class="forgot-link">
                    Esqueci minha senha
                </a>
            </form>

            <div class="version-tag">NEXO Intelligence Admin v1.1</div>
        </div>
    </div>

    <!-- 1. Supabase SDK — versão fixada + SRI (Supply Chain Attack protection) -->
    <script
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"
        integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil"
        crossorigin="anonymous">
    </script>

    <!-- 2. Env vars — gerado no build Vercel, nunca no repo -->
    <script src="env.js"></script>

    <!-- 3. Config + Auth -->
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>

    <!-- 4. Lógica do login -->
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Se já tem sessão ativa, redireciona direto para o admin
            var session = await NEXO.supabase.auth.getSession();
            if (session.data.session) {
                window.location.href = 'admin.html';
                return;
            }

            var form = document.getElementById('login-form');
            var btnLogin = document.getElementById('btn-login');
            var errorDiv = document.getElementById('login-error');

            form.addEventListener('submit', async function () {
                var email = document.getElementById('email').value.trim();
                var senha = document.getElementById('senha').value;

                errorDiv.textContent = '';
                errorDiv.style.display = 'none';
                btnLogin.disabled = true;
                btnLogin.textContent = 'Entrando...';

                try {
                    await NEXO.auth.login(email, senha);
                    window.location.href = 'admin.html';
                } catch (err) {
                    errorDiv.textContent = err.message;
                    errorDiv.style.display = 'block';
                    btnLogin.disabled = false;
                    btnLogin.textContent = 'Entrar';
                }
            });
        });
    </script>
</body>
</html>
