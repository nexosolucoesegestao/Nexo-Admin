<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO Intelligence — Recuperar Senha</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .login-card { animation: fadeUp 0.5s ease forwards; opacity: 0; transform: translateY(12px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .success-msg { background: var(--success-dim); border: 1px solid rgba(52,211,153,0.3);
            border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 0.85rem;
            color: var(--success); margin-bottom: 1rem; display: none; }
        .success-msg.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <img src="assets/logo-nexo.png" alt="NEXO" onerror="this.style.display='none'">
                <h1>Recuperar Senha</h1>
            </div>

            <div class="login-error" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>

            <form id="reset-form" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="email">Email cadastrado</label>
                    <input type="email" id="email" class="form-input"
                        placeholder="seu@email.com" autocomplete="email" required>
                </div>

                <div class="form-actions" style="margin-top:1.5rem;">
                    <button type="submit" class="btn btn-primary" id="btn-reset" style="width:100%;">
                        Enviar link de recuperação
                    </button>
                </div>

                <a href="index.html" class="forgot-link">← Voltar ao login</a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>

    <script>
        const form = document.getElementById('reset-form');
        const btnReset = document.getElementById('btn-reset');
        const errorDiv = document.getElementById('error-msg');
        const successDiv = document.getElementById('success-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.remove('visible');
            successDiv.classList.remove('visible');

            const email = document.getElementById('email').value;
            if (!email) { errorDiv.textContent = 'Informe seu email.'; errorDiv.classList.add('visible'); return; }

            NEXO.ui.btnLoading(btnReset, true, 'Enviando...');

            try {
                await NEXO.auth.resetPassword(email);
                successDiv.textContent = 'Email enviado! Verifique sua caixa de entrada.';
                successDiv.classList.add('visible');
                form.querySelector('input').disabled = true;
                btnReset.style.display = 'none';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.add('visible');
                NEXO.ui.btnLoading(btnReset, false);
            }
        });
    </script>
</body>
</html>
